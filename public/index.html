<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Catálogo de Salud — Centro de Información Médica</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Inter',system-ui,sans-serif;background:#FAFAFA;color:#111;-webkit-font-smoothing:antialiased}
    ::selection{background:rgba(0,154,144,.15)}
    input:focus,select:focus,textarea:focus{outline:none}
    button{cursor:pointer}
    .scrollbar-hide::-webkit-scrollbar{display:none}
    .scrollbar-hide{-ms-overflow-style:none;scrollbar-width:none}
    @media print{.no-print{display:none!important}}

    /* Animations */
    .fade-in{animation:fadeIn .3s ease-out both}
    .slide-up{animation:slideUp .35s ease-out both}
    .slide-right{animation:slideRight .3s ease-out both}
    .scale-in{animation:scaleIn .25s ease-out both}
    @keyframes fadeIn{from{opacity:0}to{opacity:1}}
    @keyframes slideUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
    @keyframes slideRight{from{opacity:0;transform:translateX(-12px)}to{opacity:1;transform:translateX(0)}}
    @keyframes scaleIn{from{opacity:0;transform:scale(.96)}to{opacity:1;transform:scale(1)}}

    /* Staggered delays */
    .delay-1{animation-delay:.05s}.delay-2{animation-delay:.1s}.delay-3{animation-delay:.15s}
    .delay-4{animation-delay:.2s}.delay-5{animation-delay:.25s}.delay-6{animation-delay:.3s}

    /* Smooth hover transitions */
    .hover-lift{transition:transform .2s ease,box-shadow .2s ease}
    .hover-lift:hover{transform:translateY(-2px);box-shadow:0 4px 12px rgba(0,0,0,.08)}
  </style>
  <script>tailwind.config={theme:{extend:{colors:{brand:{'50':'#E6F5F4','500':'#009A90','600':'#008A81','700':'#007A72'}}}}}</script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useCallback,useRef}=React;

/* ── API ── */
const API='/api';
function getToken(){return localStorage.getItem('token')}
function getUser(){try{return JSON.parse(localStorage.getItem('user'))}catch{return null}}
function saveAuth(t,u){localStorage.setItem('token',t);localStorage.setItem('user',JSON.stringify(u))}
function clearAuth(){localStorage.removeItem('token');localStorage.removeItem('user')}
async function apiFetch(ep,o={}){
  const h={'Content-Type':'application/json',...(o.headers||{})};const t=getToken();if(t)h['Authorization']=`Bearer ${t}`;
  const r=await fetch(`${API}${ep}`,{...o,headers:h});
  if(r.status===401){clearAuth();throw new Error('No autorizado')}
  if(!r.ok){const e=await r.json().catch(()=>({}));throw new Error(e.error||`Error ${r.status}`)}
  return r.json();
}
async function apiUpload(ep,fd){const h={};const t=getToken();if(t)h['Authorization']=`Bearer ${t}`;const r=await fetch(`${API}${ep}`,{method:'POST',headers:h,body:fd});if(!r.ok){const e=await r.json().catch(()=>({}));throw new Error(e.error||`Error ${r.status}`)}return r.json()}

/* ── TIPO STYLES (muted/professional) ── */
function ts(t){
  if(t.includes('GER'))return{bg:'#EBF0F7',fg:'#3D5A80'};
  if(t.includes('GRR'))return{bg:'#EDE7F6',fg:'#5C527F'};
  if(t==='NOM')return{bg:'#FDECEA',fg:'#8B3A3A'};
  if(t==='PRONAM')return{bg:'#FFF3E0',fg:'#8B6914'};
  if(t==='Lineamiento')return{bg:'#E0F2F1',fg:'#2E7D6F'};
  if(t==='SSa')return{bg:'#F3E5F5',fg:'#6A1B6D'};
  return{bg:'#ECEFF1',fg:'#546E7A'};
}

/* ── CATEGORY COLORS (for publications) ── */
function catColor(c){
  if(c==='Nueva GPC')return{bg:'#E8F5E9',fg:'#2E7D32'};
  if(c==='Nueva NOM')return{bg:'#FFEBEE',fg:'#C62828'};
  if(c==='Lineamiento')return{bg:'#E0F2F1',fg:'#00695C'};
  if(c==='PRONAM')return{bg:'#FFF8E1',fg:'#F57F17'};
  return{bg:'#ECEFF1',fg:'#546E7A'};
}

/* ── ICONS ── */
const I={
  Search:({c="",s=20})=><svg viewBox="0 0 24 24" width={s} height={s} stroke="currentColor" strokeWidth="2" fill="none" strokeLinecap="round" strokeLinejoin="round" className={c}><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>,
  X:({s=14,onClick})=><svg onClick={onClick} style={{cursor:'pointer'}} viewBox="0 0 24 24" width={s} height={s} stroke="currentColor" strokeWidth="2.5" fill="none" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>,
  File:({s=18})=><svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>,
  Filter:({s=16})=><svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></svg>,
  User:({s=18})=><svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>,
  Logout:({s=18})=><svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>,
  Upload:({s=18})=><svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="16 16 12 12 8 16"/><line x1="12" y1="12" x2="12" y2="21"/><path d="M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3"/></svg>,
  Edit:({s=16})=><svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>,
  Trash:({s=16})=><svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>,
  Menu:({s=22})=><svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>,
  Plus:()=><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>,
  Back:({s=18})=><svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="15 18 9 12 15 6"/></svg>,
  Bell:({s=18})=><svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>,
  ExternalLink:({s=14})=><svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>,
  Star:({s=14})=><svg width={s} height={s} viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" strokeWidth="1"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>,
  Info:({s=16})=><svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>,
  Flag:({s=14})=><svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1z"/><line x1="4" y1="22" x2="4" y2="15"/></svg>,
};

/* ════════════════════════════════════
   APP
   ════════════════════════════════════ */
function App(){
  const [view,setView]=useState('home'); // home|search|auth|admin
  const [searchText,setSearchText]=useState('');
  const [activeQuery,setActiveQuery]=useState('');
  const [tipoFilter,setTipoFilter]=useState('');
  const [cursoFilter,setCursoFilter]=useState('');
  const [troncoFilter,setTroncoFilter]=useState('');
  const [showFilters,setShowFilters]=useState(false);

  const [user,setUser]=useState(getUser());
  const [authMode,setAuthMode]=useState('login');
  const [authError,setAuthError]=useState('');
  const [pendingUrl,setPendingUrl]=useState(null);
  const [reportModal,setReportModal]=useState(null); // {evidencia_id, nombre}
  const [reportMsg,setReportMsg]=useState('');
  const [reportCat,setReportCat]=useState('Enlace roto');
  const [reportSent,setReportSent]=useState(false);

  const [results,setResults]=useState([]);
  const [totalResults,setTotalResults]=useState(0);
  const [loading,setLoading]=useState(false);
  const [page,setPage]=useState(0);
  const LIMIT=25;

  const [cursos,setCursos]=useState([]);
  const [troncos,setTroncos]=useState([]);
  const [tipos,setTipos]=useState([]);
  const [banners,setBanners]=useState([]);
  const [publicaciones,setPublicaciones]=useState([]);
  const [categorias,setCategorias]=useState([]);
  const [stats,setStats]=useState(null);
  const [adminTab,setAdminTab]=useState('dashboard');
  const [adminTemas,setAdminTemas]=useState([]);
  const [mobileMenu,setMobileMenu]=useState(false);

  const isAdmin=user&&user.role==='admin';

  useEffect(()=>{
    apiFetch('/temas/cursos').then(setCursos).catch(()=>{});
    apiFetch('/temas/troncos').then(setTroncos).catch(()=>{});
    apiFetch('/evidencias/tipos').then(setTipos).catch(()=>{});
    apiFetch('/banners').then(setBanners).catch(()=>{});
    apiFetch('/publicaciones?limit=6').then(setPublicaciones).catch(()=>{});
    apiFetch('/categorias').then(setCategorias).catch(()=>{});
  },[]);

  const doSearch=useCallback(()=>{
    setLoading(true);
    const p=new URLSearchParams();
    if(activeQuery)p.set('q',activeQuery);
    if(tipoFilter)p.set('tipo',tipoFilter);
    if(cursoFilter)p.set('curso',cursoFilter);
    if(troncoFilter)p.set('tronco',troncoFilter);
    p.set('limit',LIMIT);p.set('offset',page*LIMIT);
    apiFetch(`/evidencias?${p}`).then(r=>{setResults(r.data);setTotalResults(r.total);setLoading(false)}).catch(()=>setLoading(false));
  },[activeQuery,tipoFilter,cursoFilter,troncoFilter,page]);

  useEffect(()=>{if(view==='search'&&(activeQuery||tipoFilter||cursoFilter||troncoFilter))doSearch();else if(view==='search'&&!activeQuery&&!tipoFilter&&!cursoFilter&&!troncoFilter){setResults([]);setTotalResults(0)}},[doSearch,view]);
  useEffect(()=>{setPage(0)},[activeQuery,tipoFilter,cursoFilter,troncoFilter]);

  const handleSearch=(e)=>{if(e)e.preventDefault();setActiveQuery(searchText.trim());setView('search')};
  const clearAll=()=>{setSearchText('');setActiveQuery('');setTipoFilter('');setCursoFilter('');setTroncoFilter('')};
  const hasFilters=tipoFilter||cursoFilter||troncoFilter||activeQuery;
  const totalPages=Math.ceil(totalResults/LIMIT);
  const logout=()=>{clearAuth();setUser(null);setView('home')};

  const afterAuth=()=>{if(pendingUrl){window.open(pendingUrl,'_blank');setPendingUrl(null);setView('search')}else{setView('home')}};
  const handleLogin=async(e)=>{e.preventDefault();setAuthError('');const fd=new FormData(e.target);try{const r=await apiFetch('/auth/login',{method:'POST',body:JSON.stringify({email:fd.get('email'),password:fd.get('password')})});saveAuth(r.token,r.user);setUser(r.user);afterAuth()}catch(err){setAuthError(err.message)}};
  const handleRegister=async(e)=>{e.preventDefault();setAuthError('');const fd=new FormData(e.target);const especialidades=fd.getAll('especialidades');try{const r=await apiFetch('/auth/register',{method:'POST',body:JSON.stringify({nombre:fd.get('nombre'),email:fd.get('email'),password:fd.get('password'),especialidades})});saveAuth(r.token,r.user);setUser(r.user);afterAuth()}catch(err){setAuthError(err.message)}};
  const loadAdmin=()=>{apiFetch('/stats').then(setStats).catch(()=>{});apiFetch('/temas?limit=2000').then(r=>setAdminTemas(r.data)).catch(()=>{})};

  /* ── HEADER ── */
  const Header=()=>(
    <header className="bg-white border-b border-gray-100 px-4 md:px-8 h-[60px] flex items-center justify-between sticky top-0 z-50" style={{boxShadow:'0 1px 3px rgba(0,0,0,0.04)'}}>
      <button onClick={()=>{setView('home');clearAll()}} className="flex items-center gap-2 hover:opacity-80 transition-opacity">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#009A90" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8" fill="#E6F5F4" stroke="#009A90"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="8" y1="9" x2="14" y2="9" strokeWidth="2"/><line x1="8" y1="13" x2="14" y2="13" strokeWidth="2"/></svg>
        <span className="font-bold text-[16px] tracking-tight text-[#111]">Catálogo <span className="text-[#009A90]">de Salud</span></span>
      </button>
      <nav className="flex items-center gap-2">
        <button onClick={()=>{setView('home');clearAll()}} className="text-[13px] font-medium text-gray-500 hover:text-[#009A90] px-2 py-1 hidden md:block">Inicio</button>
        <button onClick={()=>{setActiveQuery('');setView('search')}} className="text-[13px] font-medium text-gray-500 hover:text-[#009A90] px-2 py-1 hidden md:block">Buscador</button>
        {user?(
          <>
            {isAdmin&&<button onClick={()=>{setView('admin');loadAdmin()}} className="text-[13px] font-medium text-gray-500 hover:text-[#009A90] px-2 py-1 hidden md:block">Admin</button>}
            <span className="text-[11px] text-gray-400 hidden md:inline px-2">{user.nombre}</span>
            <button onClick={logout} className="text-gray-400 hover:text-gray-600 p-1" title="Salir"><I.Logout s={16}/></button>
          </>
        ):(
          <>
            <button onClick={()=>{setView('auth');setAuthMode('login')}} className="text-[13px] font-medium text-gray-600 hover:text-[#009A90] px-3 py-1.5 border border-gray-200 rounded-lg hover:border-gray-300">Iniciar sesión</button>
            <button onClick={()=>{setView('auth');setAuthMode('register')}} className="text-[13px] font-medium text-white bg-[#009A90] px-3 py-1.5 rounded-lg hover:bg-[#00857A] hidden md:block">Registrarse</button>
          </>
        )}
        <button className="md:hidden text-gray-500 p-1" onClick={()=>setMobileMenu(!mobileMenu)}><I.Menu s={20}/></button>
      </nav>
      {mobileMenu&&<div className="absolute top-[60px] left-0 right-0 bg-white border-b border-gray-200 p-4 flex flex-col gap-2 md:hidden z-50">
        <button onClick={()=>{setView('home');setMobileMenu(false)}} className="text-left text-[14px] text-gray-700 py-2">Inicio</button>
        <button onClick={()=>{setView('search');setMobileMenu(false)}} className="text-left text-[14px] text-gray-700 py-2">Buscador</button>
        {isAdmin&&<button onClick={()=>{setView('admin');loadAdmin();setMobileMenu(false)}} className="text-left text-[14px] text-[#009A90] py-2">Administrador</button>}
      </div>}
    </header>
  );

  /* ════════════════════════════
     HOME VIEW — Centro de información
     ════════════════════════════ */
  const HomeView=()=>{
    const headerBanners=banners.filter(b=>b.posicion==='header');
    const destacadas=publicaciones.filter(p=>p.destacado);
    const recientes=publicaciones.filter(p=>!p.destacado);
    return(
    <main className="max-w-[960px] mx-auto px-4 md:px-8 py-8 md:py-12">
      {/* HERO */}
      <div className="mb-8 fade-in">
        <h1 className="text-[32px] md:text-[44px] font-bold tracking-tight text-[#111] leading-[1.1] mb-2">Centro de información médica</h1>
        <p className="text-gray-500 text-[15px] md:text-[16px]">Guías de Práctica Clínica, NOM, PRONAM y documentos oficiales mexicanos</p>
      </div>

      {/* SEARCH BAR */}
      <form onSubmit={handleSearch} className="flex gap-2 mb-8 slide-up delay-1">
        <div className="flex-1 relative">
          <div className="absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"><I.Search s={18}/></div>
          <input type="text" value={searchText} onChange={e=>setSearchText(e.target.value)}
            placeholder="Buscar GPC por título, tema o especialidad..."
            className="w-full bg-white border border-gray-200 rounded-xl py-3.5 pl-11 pr-4 text-[14px] text-[#111] placeholder:text-gray-400 focus:border-[#009A90] transition-colors shadow-sm"/>
        </div>
        <button type="submit" className="bg-[#009A90] text-white px-6 py-3.5 rounded-xl text-[14px] font-semibold hover:bg-[#00857A] transition-colors shrink-0 shadow-sm">Buscar</button>
      </form>

      {/* ANUNCIO PRINCIPAL — Banner grande con imagen */}
      {headerBanners.length>0&&<div className="mb-8 space-y-4 slide-up delay-2">{headerBanners.map(b=>(
        <a key={b.id} href={b.enlace_url||'#'} target={b.enlace_url&&b.enlace_url!=='#'?'_blank':undefined}
          className="block rounded-2xl overflow-hidden hover:shadow-lg transition-all group relative" style={{background:'linear-gradient(135deg, #009A90 0%, #00B4A8 50%, #007A72 100%)'}}>
          <div className="flex flex-col md:flex-row">
            {b.imagen_url&&<div className="md:w-2/5 h-48 md:h-auto"><img src={b.imagen_url} className="w-full h-full object-cover" onError={e=>e.target.parentElement.style.display='none'}/></div>}
            <div className={`flex-1 p-6 md:p-8 flex flex-col justify-center ${b.imagen_url?'':'text-center py-10'}`}>
              <div className="flex items-center gap-2 mb-2"><span className="bg-white/20 text-white px-2.5 py-0.5 rounded-full text-[10px] font-bold uppercase tracking-wider">Anuncio</span></div>
              <h2 className="text-[22px] md:text-[28px] font-bold text-white leading-tight mb-2 group-hover:underline">{b.titulo}</h2>
              {b.descripcion&&<p className="text-white/80 text-[14px] md:text-[15px] leading-relaxed mb-4">{b.descripcion}</p>}
              <div className="flex items-center gap-2"><span className="bg-white text-[#009A90] px-4 py-2 rounded-lg text-[13px] font-bold group-hover:bg-gray-100 transition-colors">Ver más</span></div>
            </div>
          </div>
        </a>
      ))}</div>}

      {/* PUBLICACIONES DESTACADAS — Cards visuales */}
      {destacadas.length>0&&(
        <div className="mb-10 slide-up delay-3">
          <div className="flex items-center justify-between mb-4">
            <div className="flex items-center gap-2"><I.Star s={16}/><h2 className="text-[18px] font-bold text-[#111]">Destacadas</h2></div>
            <span className="text-[11px] text-gray-400 bg-red-50 text-red-600 px-2 py-0.5 rounded-full font-semibold">Nuevo</span>
          </div>
          <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
            {destacadas.map(p=>{const cc=catColor(p.categoria);return(
              <a key={p.id} href={p.enlace_url||'#'} target={p.enlace_url&&p.enlace_url!=='#'?'_blank':undefined}
                className="bg-white border border-gray-200 rounded-xl overflow-hidden hover:shadow-md hover:border-gray-300 transition-all group hover-lift">
                {p.imagen_url&&<div className="h-36 bg-gray-100"><img src={p.imagen_url} className="w-full h-full object-cover" onError={e=>e.target.parentElement.style.display='none'}/></div>}
                <div className="p-5">
                  <div className="flex items-center gap-2 mb-2">
                    <span className="px-2 py-0.5 rounded text-[10px] font-semibold" style={{backgroundColor:cc.bg,color:cc.fg}}>{p.categoria}</span>
                    <span className="text-[11px] text-gray-400">{p.fecha}</span>
                  </div>
                  <h3 className="text-[15px] font-bold text-[#111] leading-snug mb-2 group-hover:text-[#009A90] transition-colors">{p.titulo}</h3>
                  <p className="text-[13px] text-gray-500 leading-relaxed line-clamp-2">{p.descripcion}</p>
                  <div className="flex items-center gap-1 mt-3 text-[12px] text-[#009A90] font-medium">Ver publicación <I.ExternalLink s={12}/></div>
                </div>
              </a>
            )})}
          </div>
        </div>
      )}

      {/* PUBLICACIONES RECIENTES */}
      {recientes.length>0&&(
        <div className="mb-10 slide-up delay-4">
          <div className="flex items-center gap-2 mb-4">
            <I.Bell s={16}/>

          </form>}

        </div>}

        {/* USUARIOS */}
        {adminTab==='usuarios'&&<div>

            </div>
          </div>
          {(f._reportes||[]).length===0&&<p className="text-center text-gray-400 py-8 text-[13px]">Sin reportes</p>}

                </div>
                <div className="flex gap-1 shrink-0">
                  {r.estado==='pendiente'&&<button onClick={()=>{apiFetch(`/reportes/${r.id}`,{method:'PUT',body:JSON.stringify({estado:'en revisión'})}).then(()=>apiFetch('/reportes').then(d=>setF(p=>({...p,_reportes:d}))))}} className="text-[11px] text-blue-500 hover:underline">Revisar</button>}
                  {r.estado==='en revisión'&&<button onClick={()=>{apiFetch(`/reportes/${r.id}`,{method:'PUT',body:JSON.stringify({estado:'resuelto'})}).then(()=>apiFetch('/reportes').then(d=>setF(p=>({...p,_reportes:d}))))}} className="text-[11px] text-green-600 hover:underline">Resolver</button>}
                  <button onClick={()=>{if(confirm('¿Eliminar?')){apiFetch(`/reportes/${r.id}`,{method:'DELETE'}).then(()=>apiFetch('/reportes').then(d=>setF(p=>({...p,_reportes:d}))))}}} className="text-gray-400 hover:text-red-500 p-1"><I.Trash/></button>

              </div>
            </div>

      </main>

  const LegalView=()=>{
    const pages={
      privacidad:{title:'Aviso de Privacidad',content:`
AVISO DE PRIVACIDAD INTEGRAL

En cumplimiento con la Ley Federal de Protección de Datos Personales en Posesión de los Particulares (LFPDPPP), Catálogo de Salud pone a su disposición el presente Aviso de Privacidad.

RESPONSABLE DEL TRATAMIENTO DE DATOS PERSONALES
Catálogo de Salud (en adelante "el Responsable") con domicilio en México, es responsable del tratamiento de sus datos personales.

DATOS PERSONALES RECABADOS
Para el registro y uso de nuestros servicios, recabamos los siguientes datos personales:
• Nombre completo
• Correo electrónico
• Contraseña (almacenada de forma encriptada mediante bcrypt)

No recabamos datos personales sensibles, financieros ni patrimoniales.

FINALIDADES DEL TRATAMIENTO
Sus datos personales serán utilizados para:
• Crear y administrar su cuenta de usuario
• Permitir el acceso a documentos oficiales de salud
• Enviar comunicaciones relacionadas con actualizaciones de GPC, NOM y documentos oficiales
• Gestionar reportes y sugerencias enviados por usted
• Elaborar estadísticas internas de uso (de forma anónima)

TRANSFERENCIA DE DATOS
Sus datos personales NO serán transferidos ni compartidos con terceros nacionales o internacionales, salvo en los casos previstos por la Ley.

DERECHOS ARCO
Usted tiene derecho a Acceder, Rectificar, Cancelar u Oponerse al tratamiento de sus datos personales (Derechos ARCO). Para ejercer estos derechos, envíe un correo electrónico a: contacto@catalogosalud.com indicando su nombre, correo registrado y el derecho que desea ejercer. Responderemos en un plazo máximo de 20 días hábiles.

REVOCACIÓN DEL CONSENTIMIENTO
Usted puede revocar su consentimiento para el tratamiento de sus datos en cualquier momento, enviando una solicitud al correo antes mencionado.

COOKIES
Este sitio utiliza cookies técnicas necesarias para el funcionamiento del servicio (autenticación de sesión). No utilizamos cookies de rastreo ni de publicidad de terceros.

MODIFICACIONES AL AVISO DE PRIVACIDAD
Nos reservamos el derecho de modificar este Aviso de Privacidad. Cualquier cambio será publicado en esta misma página con la fecha de actualización.

Última actualización: Abril 2026.`},

      terminos:{title:'Términos y Condiciones',content:`
TÉRMINOS Y CONDICIONES DE USO

Al acceder y utilizar el sitio web Catálogo de Salud (en adelante "el Sitio"), usted acepta los presentes Términos y Condiciones.

1. DESCRIPCIÓN DEL SERVICIO
Catálogo de Salud es una plataforma de consulta que facilita el acceso a Guías de Práctica Clínica (GPC), Normas Oficiales Mexicanas (NOM), PRONAM, lineamientos y otros documentos oficiales publicados por instituciones del Sistema Nacional de Salud de México.

2. NATURALEZA INFORMATIVA
El contenido de este sitio es estrictamente informativo y educativo. NO constituye asesoría médica, diagnóstico ni tratamiento. Consulte siempre a un profesional de la salud calificado.

3. PROPIEDAD INTELECTUAL
Los documentos enlazados (GPC, NOM, lineamientos) son propiedad de sus respectivas instituciones emisoras: Secretaría de Salud (SSa), IMSS, ISSSTE, CENETEC y demás organismos del gobierno mexicano. Catálogo de Salud no reclama autoría ni propiedad sobre dichos documentos. Este sitio únicamente facilita el acceso a documentos de carácter público con fines educativos.

4. REGISTRO DE USUARIOS
Para acceder a los documentos es necesario crear una cuenta gratuita. Al registrarse, usted se compromete a:
• Proporcionar información veraz y actualizada
• Mantener la confidencialidad de su contraseña
• No compartir su cuenta con terceros
• Utilizar el servicio exclusivamente con fines educativos y profesionales

5. CONTENIDO PUBLICITARIO
El Sitio puede mostrar contenido promocional de productos y servicios educativos relacionados con el ámbito médico. Dicho contenido estará identificado como publicidad.

6. LIMITACIÓN DE RESPONSABILIDAD
Catálogo de Salud no garantiza:
• La disponibilidad permanente de los enlaces a documentos oficiales
• La vigencia o actualización de los documentos enlazados
• La exactitud de la información contenida en documentos de terceros
El usuario es responsable de verificar la vigencia de cualquier documento consultado.

7. REPORTES Y SUGERENCIAS
Los usuarios registrados pueden enviar reportes sobre enlaces rotos o sugerir nuevos documentos. Estos reportes serán revisados por el equipo administrativo.

8. MODIFICACIONES
Nos reservamos el derecho de modificar estos Términos en cualquier momento. El uso continuado del Sitio después de los cambios constituye su aceptación.

9. LEGISLACIÓN APLICABLE
Estos Términos se rigen por las leyes federales de los Estados Unidos Mexicanos.

Última actualización: Abril 2026.`},

      deslinde:{title:'Deslinde de Responsabilidad',content:`
DESLINDE DE RESPONSABILIDAD MÉDICA Y LEGAL

1. CARÁCTER INFORMATIVO
Catálogo de Salud es una plataforma de consulta educativa. Todo el contenido disponible tiene fines exclusivamente informativos y de referencia académica. No sustituye en ningún caso la consulta, diagnóstico o tratamiento médico profesional.

2. DOCUMENTOS DE TERCEROS
Los documentos accesibles a través de esta plataforma (GPC, NOM, PRONAM, lineamientos) son elaborados y publicados por instituciones del gobierno mexicano:
• Secretaría de Salud (SSa)
• Instituto Mexicano del Seguro Social (IMSS)
• Instituto de Seguridad y Servicios Sociales de los Trabajadores del Estado (ISSSTE)
• Centro Nacional de Excelencia Tecnológica en Salud (CENETEC)

Catálogo de Salud NO es autor, editor ni propietario de dichos documentos. Estos son documentos de acceso público conforme a la Ley General de Transparencia y Acceso a la Información Pública.

3. ENLACES Y RESPALDOS
Los documentos se enlazan a sus fuentes oficiales cuando están disponibles. Los respaldos en servicios de almacenamiento se proporcionan como alternativa cuando los enlaces oficiales no están disponibles, con fines estrictamente educativos.

4. SIN RELACIÓN GUBERNAMENTAL
Catálogo de Salud NO es una entidad gubernamental ni está afiliado a ninguna institución de salud pública. Es un proyecto independiente de carácter educativo.

5. EXENCIÓN DE RESPONSABILIDAD
No nos hacemos responsables de:
• Decisiones médicas tomadas con base en la información consultada
• La disponibilidad o vigencia de los documentos enlazados
• Errores u omisiones en documentos publicados por terceros
• Daños derivados del uso de la información proporcionada

6. USO RECOMENDADO
Los profesionales de la salud y estudiantes de medicina deben siempre:
• Consultar las fuentes oficiales más recientes
• Verificar la vigencia de las guías antes de aplicarlas
• Complementar con criterio clínico profesional

Última actualización: Abril 2026.`},

      cookies:{title:'Política de Cookies',content:`
POLÍTICA DE COOKIES

1. ¿QUÉ SON LAS COOKIES?
Las cookies son pequeños archivos de texto que se almacenan en su dispositivo al visitar un sitio web. Permiten recordar sus preferencias y mejorar su experiencia de navegación.

2. COOKIES QUE UTILIZAMOS
Catálogo de Salud utiliza únicamente cookies técnicas esenciales:

• Cookie de autenticación (token JWT): Almacenada en localStorage, permite mantener su sesión activa durante 7 días sin necesidad de volver a iniciar sesión. Contiene un identificador cifrado, no sus datos personales.

• Cookie de preferencias de interfaz: Almacena su preferencia de vista (última búsqueda, filtros seleccionados).

3. COOKIES QUE NO UTILIZAMOS
NO utilizamos:
• Cookies de rastreo o seguimiento
• Cookies de publicidad de terceros (Google Ads, Facebook Pixel, etc.)
• Cookies de análisis de terceros (Google Analytics, etc.)
• Cookies de redes sociales

4. CONTROL DE COOKIES
Usted puede eliminar las cookies almacenadas en cualquier momento:
• Cerrando sesión en el Sitio (elimina el token de autenticación)
• Limpiando los datos del navegador (Configuración > Privacidad > Borrar datos de navegación)

5. BASE LEGAL
El uso de cookies técnicas esenciales está amparado por la LFPDPPP y no requiere consentimiento expreso, ya que son necesarias para el funcionamiento del servicio.

Última actualización: Abril 2026.`}
    };
    const p=pages[legalPage];
    if(!p)return null;
    return(
      <main className="max-w-[700px] mx-auto px-4 md:px-8 py-8">
        <button onClick={()=>{setLegalPage(null);setView('home')}} className="flex items-center gap-1 text-[13px] text-gray-500 hover:text-[#009A90] mb-6"><I.Back s={16}/>Volver al inicio</button>

        {view==='legal'&&<LegalView/>}

          {reportSent?<div className="text-center py-4"><div className="w-12 h-12 bg-green-50 rounded-full flex items-center justify-center mx-auto mb-3 text-green-600"><I.Flag s={20}/></div><p className="text-[15px] font-semibold text-[#111] mb-1">Reporte enviado</p><p className="text-[13px] text-gray-500 mb-4">Gracias por tu contribución. Revisaremos tu reporte.</p><button onClick={()=>setReportModal(null)} className="bg-[#009A90] text-white px-4 py-2 rounded-lg text-[13px] font-semibold hover:bg-[#00857A]">Cerrar</button></div>:(
          <div>
            <h3 className="text-[16px] font-bold text-[#111] mb-1">Reportar documento</h3>
            <p className="text-[12px] text-gray-500 mb-3 truncate">{reportModal.nombre}</p>
            <div className="space-y-3">
              <div><label className="block text-[11px] font-medium text-gray-500 uppercase tracking-wider mb-1">Categoría</label>
                <select value={reportCat} onChange={e=>setReportCat(e.target.value)} className="w-full border border-gray-200 rounded-lg px-3 py-2 text-[13px] focus:border-[#009A90]">
                  <option>Enlace roto</option><option>Información incorrecta</option><option>Sugerir nueva GPC</option><option>Documento duplicado</option><option>Otro</option>
                </select>
              </div>
              <div><label className="block text-[11px] font-medium text-gray-500 uppercase tracking-wider mb-1">Mensaje</label>
                <textarea value={reportMsg} onChange={e=>setReportMsg(e.target.value)} rows={3} placeholder="Describe el problema o sugerencia..." className="w-full border border-gray-200 rounded-lg px-3 py-2 text-[13px] focus:border-[#009A90]"/>
              </div>
              <div className="flex gap-2">
                <button onClick={async()=>{if(!reportMsg.trim())return;try{await apiFetch('/reportes',{method:'POST',body:JSON.stringify({evidencia_id:reportModal.evidencia_id,categoria:reportCat,mensaje:reportMsg})});setReportSent(true)}catch(err){alert(err.message)}}} disabled={!reportMsg.trim()} className="bg-[#009A90] text-white px-4 py-2 rounded-lg text-[12px] font-semibold hover:bg-[#00857A] disabled:opacity-50">Enviar reporte</button>
                <button onClick={()=>setReportModal(null)} className="px-4 py-2 rounded-lg text-[12px] text-gray-500 border border-gray-200 hover:bg-gray-50">Cancelar</button>
              </div>
            </div>
          </div>)}
        </div>
      </div>}
    </div>
  );
}

const root=ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
